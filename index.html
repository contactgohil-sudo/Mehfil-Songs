<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mehfil Lyrics Search</title>

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #111;
      margin: 0;
      padding: 12px;
      overflow-x: hidden;
    }

    .container {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .info {
      color: #444;
      font-size: 14px;
    }

    .error-box {
      background: #fff3cd;
      color: #856404;
      border: 1px solid #ffe69c;
      padding: 10px 12px;
      border-radius: 10px;
      margin-bottom: 12px;
      display: none;
      white-space: pre-wrap;
    }

    .admin-toggle {
      background: #111;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
    }

    .admin-box {
      background: white;
      border: 1px solid #ddd;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 18px;
      display: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .admin-box.show {
      display: block;
    }

    .admin-box h2 {
      margin-top: 0;
      font-size: 20px;
    }

    .admin-box input,
    .admin-box textarea {
      width: 100%;
      margin-bottom: 10px;
      padding: 12px;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #ccc;
      outline: none;
      background: white;
      color: #111;
    }

    .admin-box textarea {
      min-height: 180px;
      resize: vertical;
    }

    .admin-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .save-btn,
    .close-btn,
    .cancel-edit-btn,
    .edit-btn {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
    }

    .save-btn,
    .edit-btn {
      background: #111;
      color: white;
    }

    .close-btn,
    .cancel-edit-btn {
      background: #ddd;
      color: #111;
    }

    .search-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
      width: 100%;
      align-items: stretch;
    }

    .search-input {
      flex: 1;
      min-width: 0;
      width: 100%;
      padding: 16px;
      font-size: 20px;
      border-radius: 14px;
      border: 1px solid #ccc;
      outline: none;
      background: white;
      color: #111;
    }

    .icon-btn {
      border: 1px solid #ccc;
      border-radius: 14px;
      padding: 0 16px;
      font-size: 22px;
      cursor: pointer;
      min-width: 54px;
      background: white;
      color: #111;
      flex-shrink: 0;
    }

    .card {
      background: white;
      border: 1px solid #ddd;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
      width: 100%;
      overflow-wrap: break-word;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 8px;
    }

    .card-main {
      min-width: 0;
      flex: 1;
    }

    .title {
      font-size: 20px;
      font-weight: bold;
    }

    .meta {
      color: #555;
      margin-top: 4px;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .lyrics {
      line-height: 1.7;
      white-space: pre-wrap;
      color: #111;
      font-size: 16px;
    }

    .empty {
      color: #666;
      text-align: center;
      padding: 20px 10px;
    }

    mark {
      background: #ffeb3b;
      color: #111;
      padding: 0 2px;
      border-radius: 3px;
    }

    @media (max-width: 480px) {
      body { padding: 10px; }
      h1 { font-size: 24px; }
      .search-input { font-size: 18px; padding: 14px; }
      .icon-btn { font-size: 20px; min-width: 48px; }
      .title { font-size: 18px; }
      .lyrics { font-size: 15px; }
      .card-header { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Mehfil Lyrics Search</h1>

    <div class="top-row">
      <div class="info" id="status">Loading...</div>
      <button id="toggleAdminBtn" class="admin-toggle" type="button">+ Add Song</button>
    </div>

    <div id="errorBox" class="error-box"></div>

    <div class="admin-box" id="adminBox">
      <h2 id="formHeading">Add Song</h2>
      <form id="addSongForm">
        <input id="songTitle" type="text" placeholder="Song title" />
        <input id="songMovie" type="text" placeholder="Movie name" />
        <input id="songSinger" type="text" placeholder="Singer name" />
        <textarea id="songLyrics" placeholder="Paste full lyrics"></textarea>

        <div class="admin-actions">
          <button class="save-btn" id="saveSongBtn" type="submit">Save Song</button>
          <button class="cancel-edit-btn" id="cancelEditBtn" type="button" style="display:none;">Cancel Edit</button>
          <button class="close-btn" id="closeAdminBtn" type="button">Close</button>
          <div id="formStatus" class="info"></div>
        </div>
      </form>
    </div>

    <div class="search-bar">
      <button id="micBtn" class="icon-btn" type="button">🎤</button>
      <input id="searchInput" class="search-input" type="text" placeholder="Type or speak 2-3 words..." />
      <button id="clearBtn" class="icon-btn" type="button">✕</button>
    </div>

    <div id="results"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const SUPABASE_URL = "https://fppyrhsnqgisfxkdbkka.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZwcHlyaHNucWdpc2Z4a2Ria2thIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MzAxMjMsImV4cCI6MjA4OTEwNjEyM30.pXf_6qzEVw_fQpalyWsfxXgHrlbs1IA9BBmwfqmurDo";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let songs = [];
    let editingSongId = null;

    function showError(message) {
      const errorBox = document.getElementById("errorBox");
      if (!message) {
        errorBox.style.display = "none";
        errorBox.textContent = "";
        return;
      }
      errorBox.style.display = "block";
      errorBox.textContent = message;
    }

    function escapeHtml(text) {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function normalize(text) {
      return String(text || "")
        .toLowerCase()
        .normalize("NFC")
        .replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?"'!|[\]\\]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function buildNormalizedMap(originalText) {
      const original = String(originalText || "");
      let normalized = "";
      const map = [];

      for (let i = 0; i < original.length; i++) {
        const normalizedChar = original[i].toLowerCase().normalize("NFC");
        for (let j = 0; j < normalizedChar.length; j++) {
          normalized += normalizedChar[j];
          map.push(i);
        }
      }

      normalized = normalized
        .replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?"'!|[\]\\]/g, " ")
        .replace(/\s+/g, " ")
        .trim();

      return { normalized, original };
    }

    async function loadSongs() {
      const status = document.getElementById("status");
      status.textContent = "Loading songs...";
      showError("");

      const { data, error } = await supabaseClient
        .from("songs")
        .select("*")
        .order("id", { ascending: false });

      if (error) {
        console.error("Load error:", error);
        status.textContent = "Failed to load songs";
        showError(`Load error: ${error.message}`);
        return;
      }

      songs = data || [];
      status.textContent = `Loaded ${songs.length} songs`;
    }

    function searchSongs(query) {
      const q = normalize(query);
      if (!q) return [];

      const words = q.split(" ").filter(Boolean);

      const scored = songs.map(song => {
        const title = normalize(song.title || "");
        const movie = normalize(song.movie || "");
        const singer = normalize(song.singer || "");
        const lyrics = normalize(song.lyrics || "");

        let score = 0;

        for (const word of words) {
          if (lyrics.includes(word)) score += 5;
          if (title.includes(word)) score += 3;
          if (movie.includes(word)) score += 2;
          if (singer.includes(word)) score += 1;
        }

        return { song, score };
      });

      return scored
        .filter(item => item.score > 0)
        .sort((a, b) => b.score - a.score)
        .map(item => item.song)
        .slice(0, 10);
    }

    function findHighlightRanges(text, query) {
      const original = String(text || "");
      const q = normalize(query);
      if (!original || !q) return [];

      const words = q.split(" ").filter(Boolean);
      if (!words.length) return [];

      const lowerOriginal = original.toLowerCase().normalize("NFC");
      const ranges = [];

      // First try exact phrase highlight on normalized raw text
      const exactIndex = lowerOriginal.indexOf(String(query).toLowerCase().normalize("NFC"));
      if (exactIndex !== -1) {
        ranges.push([exactIndex, exactIndex + String(query).length]);
      }

      // Then highlight individual words
      for (const word of words) {
        let startIndex = 0;
        while (true) {
          const found = lowerOriginal.indexOf(word, startIndex);
          if (found === -1) break;
          ranges.push([found, found + word.length]);
          startIndex = found + word.length;
        }
      }

      // Merge overlapping ranges
      ranges.sort((a, b) => a[0] - b[0]);
      const merged = [];

      for (const range of ranges) {
        if (!merged.length || range[0] > merged[merged.length - 1][1]) {
          merged.push(range);
        } else {
          merged[merged.length - 1][1] = Math.max(merged[merged.length - 1][1], range[1]);
        }
      }

      return merged;
    }

    function highlightText(text, query) {
      const original = String(text || "");
      if (!query || !query.trim()) return escapeHtml(original);

      const ranges = findHighlightRanges(original, query);
      if (!ranges.length) return escapeHtml(original);

      let result = "";
      let lastIndex = 0;

      for (const [start, end] of ranges) {
        result += escapeHtml(original.slice(lastIndex, start));
        result += `<mark>${escapeHtml(original.slice(start, end))}</mark>`;
        lastIndex = end;
      }

      result += escapeHtml(original.slice(lastIndex));
      return result;
    }

    function renderResults(results, query = "") {
      const resultsDiv = document.getElementById("results");

      if (!query.trim()) {
        resultsDiv.innerHTML = `<div class="empty">Type or speak a few words to find lyrics.</div>`;
        return;
      }

      if (!results.length) {
        resultsDiv.innerHTML = `<div class="empty">No matching song found.</div>`;
        return;
      }

      resultsDiv.innerHTML = results.map(song => `
        <div class="card">
          <div class="card-header">
            <div class="card-main">
              <div class="title">${escapeHtml(song.title || "")}</div>
              <div class="meta">${escapeHtml(song.movie || "")} • ${escapeHtml(song.singer || "")}</div>
            </div>
            <button class="edit-btn" type="button" onclick="startEdit(${song.id})">Edit</button>
          </div>
          <div class="lyrics">${highlightText(song.lyrics || "", query)}</div>
        </div>
      `).join("");
    }

    function resetForm() {
      editingSongId = null;
      document.getElementById("formHeading").textContent = "Add Song";
      document.getElementById("saveSongBtn").textContent = "Save Song";
      document.getElementById("cancelEditBtn").style.display = "none";
      document.getElementById("songTitle").value = "";
      document.getElementById("songMovie").value = "";
      document.getElementById("songSinger").value = "";
      document.getElementById("songLyrics").value = "";
      document.getElementById("formStatus").textContent = "";
    }

    function startEdit(songId) {
      const song = songs.find(s => s.id === songId);
      if (!song) return;

      editingSongId = song.id;
      document.getElementById("formHeading").textContent = "Edit Song";
      document.getElementById("saveSongBtn").textContent = "Update Song";
      document.getElementById("cancelEditBtn").style.display = "inline-block";
      document.getElementById("songTitle").value = song.title || "";
      document.getElementById("songMovie").value = song.movie || "";
      document.getElementById("songSinger").value = song.singer || "";
      document.getElementById("songLyrics").value = song.lyrics || "";
      document.getElementById("adminBox").classList.add("show");
      document.getElementById("songTitle").focus();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function saveSong(event) {
      event.preventDefault();

      const title = document.getElementById("songTitle").value.trim();
      const movie = document.getElementById("songMovie").value.trim();
      const singer = document.getElementById("songSinger").value.trim();
      const lyrics = document.getElementById("songLyrics").value.trim();
      const formStatus = document.getElementById("formStatus");

      if (!title || !lyrics) {
        formStatus.textContent = "Title and lyrics are required";
        return;
      }

      formStatus.textContent = editingSongId ? "Updating..." : "Saving...";
      showError("");

      let error = null;

      if (editingSongId) {
        const response = await supabaseClient
          .from("songs")
          .update({ title, movie, singer, lyrics })
          .eq("id", editingSongId);

        error = response.error;
      } else {
        const response = await supabaseClient
          .from("songs")
          .insert([{ title, movie, singer, lyrics }]);

        error = response.error;
      }

      if (error) {
        console.error("Save error:", error);
        formStatus.textContent = editingSongId ? "Failed to update song" : "Failed to save song";
        showError(`Save error: ${error.message}`);
        return;
      }

      formStatus.textContent = editingSongId ? "Song updated" : "Song added";

      await loadSongs();

      const input = document.getElementById("searchInput");
      renderResults(searchSongs(input.value), input.value);

      resetForm();
      document.getElementById("adminBox").classList.remove("show");
    }

    function startMicSearch() {
      const input = document.getElementById("searchInput");
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

      if (!SpeechRecognition) {
        alert("Browser mic not supported here. Use your keyboard mic.");
        return;
      }

      const recognition = new SpeechRecognition();
      recognition.lang = "hi-IN";
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;

      recognition.onresult = (event) => {
        const spokenText = event.results[0][0].transcript;
        input.value = spokenText;
        renderResults(searchSongs(spokenText), spokenText);
      };

      recognition.onerror = () => {
        alert("Mic failed. Try again or use your keyboard mic.");
      };

      recognition.start();
    }

    async function init() {
      const input = document.getElementById("searchInput");
      const clearBtn = document.getElementById("clearBtn");
      const micBtn = document.getElementById("micBtn");
      const addSongForm = document.getElementById("addSongForm");
      const toggleAdminBtn = document.getElementById("toggleAdminBtn");
      const closeAdminBtn = document.getElementById("closeAdminBtn");
      const cancelEditBtn = document.getElementById("cancelEditBtn");
      const adminBox = document.getElementById("adminBox");

      input.addEventListener("input", () => {
        renderResults(searchSongs(input.value), input.value);
      });

      clearBtn.addEventListener("click", () => {
        input.value = "";
        renderResults([], "");
        input.focus();
      });

      micBtn.addEventListener("click", startMicSearch);

      toggleAdminBtn.addEventListener("click", () => {
        adminBox.classList.toggle("show");
        if (!adminBox.classList.contains("show")) resetForm();
      });

      closeAdminBtn.addEventListener("click", () => {
        adminBox.classList.remove("show");
        resetForm();
      });

      cancelEditBtn.addEventListener("click", () => {
        resetForm();
      });

      addSongForm.addEventListener("submit", saveSong);

      await loadSongs();
      renderResults([], "");
      input.focus();
    }

    window.startEdit = startEdit;
    init();
  </script>
</body>
</html>
