<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mehfil Lyrics Search</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      margin: 0;
      padding: 12px;
      overflow-x: hidden;
    }

    .container {
      width: 100%;
      max-width: 700px;
      margin: 0 auto;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 16px;
    }

    .info {
      color: #aaa;
      margin-bottom: 12px;
    }

    .admin-box {
      background: #1d1d1d;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .admin-box h2 {
      margin-top: 0;
      font-size: 20px;
    }

    .admin-box input,
    .admin-box textarea {
      width: 100%;
      margin-bottom: 10px;
      padding: 12px;
      font-size: 16px;
      border-radius: 10px;
      border: none;
      outline: none;
    }

    .admin-box textarea {
      min-height: 140px;
      resize: vertical;
    }

    .search-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      width: 100%;
    }

    input {
      flex: 1;
      min-width: 0;
      width: 100%;
      padding: 14px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      outline: none;
    }

    button {
      padding: 14px 16px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .card {
      background: #1d1d1d;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      width: 100%;
      overflow-wrap: break-word;
    }

    .title {
      font-size: 20px;
      font-weight: bold;
    }

    .meta {
      color: #bbb;
      margin-top: 4px;
      margin-bottom: 10px;
    }

    .lyrics {
      line-height: 1.6;
      white-space: pre-wrap;
    }

    @media (max-width: 480px) {
      body {
        padding: 10px;
      }

      h1 {
        font-size: 22px;
      }

      input,
      button {
        font-size: 16px;
        padding: 12px;
      }

      .title {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Mehfil Lyrics Search</h1>
    <div class="info" id="status">Loading...</div>

    <div class="admin-box">
      <h2>Add Song</h2>
      <form id="addSongForm">
        <input id="songTitle" type="text" placeholder="Song title" />
        <input id="songMovie" type="text" placeholder="Movie name" />
        <input id="songSinger" type="text" placeholder="Singer name" />
        <textarea id="songLyrics" placeholder="Paste full lyrics"></textarea>
        <button type="submit">Save Song</button>
        <div id="formStatus" class="info"></div>
      </form>
    </div>

    <div class="search-bar">
      <input id="searchInput" type="text" placeholder="Type 2-3 words..." />
      <button id="clearBtn" type="button">❌</button>
    </div>

    <div id="results"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const SUPABASE_URL = "https://fppyrhsnqgisfxkdbkka.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZwcHlyaHNucWdpc2Z4a2Ria2thIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MzAxMjMsImV4cCI6MjA4OTEwNjEyM30.pXf_6qzEVw_fQpalyWsfxXgHrlbs1IA9BBmwfqmurDo";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let songs = [];

    function normalize(text) {
      return String(text || "")
        .toLowerCase()
        .replace(/[^\w\s]/g, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    async function loadSongs() {
      const status = document.getElementById("status");
      status.textContent = "Loading songs...";

      const { data, error } = await supabaseClient
        .from("songs")
        .select("*")
        .order("id", { ascending: false });

      if (error) {
        console.error("Load error:", error);
        status.textContent = "Failed to load songs";
        return;
      }

      songs = data || [];
      status.textContent = `Loaded ${songs.length} songs`;
    }

    function searchSongs(query) {
      const q = normalize(query);
      if (!q) return [];

      const words = q.split(" ").filter(Boolean);

      return songs.filter(song => {
        const fullText = normalize(
          `${song.title || ""} ${song.movie || ""} ${song.singer || ""} ${song.lyrics || ""}`
        );

        return words.every(word => fullText.includes(word));
      }).slice(0, 10);
    }

    function renderResults(results) {
      const resultsDiv = document.getElementById("results");

      if (!results.length) {
        resultsDiv.innerHTML = "";
        return;
      }

      resultsDiv.innerHTML = results.map(song => `
        <div class="card">
          <div class="title">${song.title || ""}</div>
          <div class="meta">${song.movie || ""} • ${song.singer || ""}</div>
          <div class="lyrics">${song.lyrics || ""}</div>
        </div>
      `).join("");
    }

    async function addSong(event) {
      event.preventDefault();

      const title = document.getElementById("songTitle").value.trim();
      const movie = document.getElementById("songMovie").value.trim();
      const singer = document.getElementById("songSinger").value.trim();
      const lyrics = document.getElementById("songLyrics").value.trim();
      const formStatus = document.getElementById("formStatus");

      if (!title || !lyrics) {
        formStatus.textContent = "Title and lyrics are required";
        return;
      }

      formStatus.textContent = "Saving...";

      const { error } = await supabaseClient
        .from("songs")
        .insert([{ title, movie, singer, lyrics }]);

      if (error) {
        console.error("Insert error:", error);
        formStatus.textContent = "Failed to save song";
        return;
      }

      formStatus.textContent = "Song added";

      document.getElementById("songTitle").value = "";
      document.getElementById("songMovie").value = "";
      document.getElementById("songSinger").value = "";
      document.getElementById("songLyrics").value = "";

      await loadSongs();

      const input = document.getElementById("searchInput");
      renderResults(searchSongs(input.value));
    }

    async function init() {
      const input = document.getElementById("searchInput");
      const clearBtn = document.getElementById("clearBtn");
      const addSongForm = document.getElementById("addSongForm");

      input.addEventListener("input", () => {
        renderResults(searchSongs(input.value));
      });

      clearBtn.addEventListener("click", () => {
        input.value = "";
        renderResults([]);
        input.focus();
      });

      addSongForm.addEventListener("submit", addSong);

      await loadSongs();
      input.focus();
    }

    init();
  </script>
</body>
</html>
