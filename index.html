<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mehfil Lyrics Search</title>

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #111;
      margin: 0;
      padding: 12px;
      overflow-x: hidden;
    }

    .container {
      width: 100%;
      max-width: 860px;
      margin: 0 auto;
    }

    h1 {
      font-size: 28px;
      margin: 0 0 8px;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .info {
      color: #444;
      font-size: 14px;
    }

    .error-box {
      background: #fff3cd;
      color: #856404;
      border: 1px solid #ffe69c;
      padding: 10px 12px;
      border-radius: 10px;
      margin-bottom: 12px;
      display: none;
      white-space: pre-wrap;
    }

    .admin-toggle,
    .lang-btn {
      background: #111;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
    }

    .lang-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .lang-btn.active {
      background: #2d6cdf;
    }

    .admin-box {
      background: white;
      border: 1px solid #ddd;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 18px;
      display: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .admin-box.show { display: block; }

    .admin-box h2 {
      margin: 0 0 10px;
      font-size: 20px;
    }

    .admin-box input,
    .admin-box textarea {
      width: 100%;
      margin-bottom: 10px;
      padding: 12px;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #ccc;
      outline: none;
      background: white;
      color: #111;

    .admin-actions {

      align-items: center;
      flex-wrap: wrap;

    .save-btn,

    .cancel-edit-btn {

      padding: 10px 14px;
      font-size: 14px;

    .save-btn {
      background: #111;
      color: white;
    }

    .close-btn,
    .cancel-edit-btn {
      background: #ddd;
      color: #111;
    }

    .search-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
      width: 100%;
      align-items: stretch;
    }

    .search-input {
      flex: 1;
      min-width: 0;
      width: 100%;
      padding: 16px;
      font-size: 20px;
      border-radius: 14px;
      border: 1px solid #ccc;
      outline: none;
      background: white;
      color: #111;
    }

    .icon-btn {
      border: 1px solid #ccc;
      border-radius: 14px;
      padding: 0 16px;
      font-size: 24px;
      cursor: pointer;
      min-width: 58px;
      background: white;
      color: #111;
      flex-shrink: 0;
    }

    .mic-listening {

      border-color: #ff7b7b;
    }

    .card {
      background: white;
      border: 1px solid #ddd;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
      width: 100%;
      overflow-wrap: break-word;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 8px;
    }

    .card-main {
      min-width: 0;
      flex: 1;
    }

    .title {
      font-size: 20px;
      font-weight: bold;
    }

    .meta {
      color: #555;
      margin-top: 4px;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .lyrics {
      line-height: 1.75;
      white-space: pre-wrap;
      color: #111;
      font-size: 16px;
    }

    .empty {
      color: #666;
      text-align: center;
      padding: 20px 10px;
    }

    .hint {
      margin-top: 8px;
      color: #666;
      font-size: 13px;
    }

    .edit-btn {
      border: 1px solid #ccc;
      background: white;
      color: #111;
      border-radius: 10px;
      width: 38px;
      height: 38px;
      min-width: 38px;
      padding: 0;
      font-size: 18px;
      cursor: pointer;
      flex-shrink: 0;
    }

    mark {
      background: #ffeb3b;
      color: #111;
      padding: 0 2px;
      border-radius: 3px;
    }

    @media (max-width: 480px) {
      body { padding: 10px; }
      h1 { font-size: 24px; }
      .search-input { font-size: 18px; padding: 14px; }
      .icon-btn { font-size: 22px; min-width: 52px; }
      .title { font-size: 18px; }
      .lyrics { font-size: 15px; }
      .card-header { flex-direction: row; align-items: flex-start; }
      .edit-btn {
        width: 34px;
        height: 34px;
        min-width: 34px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Mehfil Lyrics Search</h1>

    <div class="top-row">
      <div class="info" id="status">Loading...</div>
      <button id="toggleAdminBtn" class="admin-toggle" type="button">+ Add Song</button>
    </div>

    <div id="errorBox" class="error-box"></div>

    <div class="lang-row">
      <button id="langHiBtn" class="lang-btn active" type="button">Hindi Mic</button>

    <div class="admin-box" id="adminBox">
      <h2 id="formHeading">Add Song</h2>
      <form id="songForm">

        <div class="admin-actions">

          <button class="cancel-edit-btn" id="cancelEditBtn" type="button" style="display:none;">Cancel Edit</button>
          <button class="close-btn" id="closeAdminBtn" type="button">Close</button>

    <div class="search-bar">

        id="searchInput"

      <button id="clearBtn" class="icon-btn" type="button" title="Clear">✕</button>
    </div>

    <div id="results"></div>
  </div>

    const GUJ_VOWELS = {
      "અ":"a","આ":"aa","ઇ":"i","ઈ":"ii","ઉ":"u","ઊ":"uu","ઋ":"ri","ૠ":"rii",
      "એ":"e","ઐ":"ai","ઓ":"o","ઔ":"au"
    };

    const GUJ_MATRAS = {
      "ા":"aa","િ":"i","ી":"ii","ુ":"u","ૂ":"uu","ૃ":"ri","ૄ":"rii",
      "ે":"e","ૈ":"ai","ો":"o","ૌ":"au"
    };

    const GUJ_CONS = {
      "ક":"k","ખ":"kh","ગ":"g","ઘ":"gh","ઙ":"ng",
      "ચ":"ch","છ":"chh","જ":"j","ઝ":"jh","ઞ":"ny",
      "ટ":"t","ઠ":"th","ડ":"d","ઢ":"dh","ણ":"n",

      "શ":"sh","ષ":"sh","સ":"s","હ":"h",
      "ળ":"l"
    };

    const GUJ_SIGNS = {
      "ં":"n","ઃ":"h","ઁ":"n","્":"", "઼":""
    };

    function showError(message) {
      const box = document.getElementById("errorBox");
      if (!message) {
        box.style.display = "none";
        box.textContent = "";
        return;
      }
      box.style.display = "block";
      box.textContent = message;
    }

    function escapeHtml(text) {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function normalizeText(text) {
      return String(text || "")
        .toLowerCase()
        .normalize("NFC")
        .replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?"'!|[\]\\]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function isLatinQuery(text) {
      return /[a-z]/i.test(text || "");
    }

    function transliterateIndicWithMap(text) {
      const source = String(text || "").normalize("NFC");
      let out = "";
      const map = [];

      function pushChunk(chunk, start, end) {
        if (!chunk) return;
        out += chunk;
        for (let i = 0; i < chunk.length; i++) {
          map.push({ start, end });
        }
      }

      function processScript(index, vowels, matras, cons, signs, viramaChar) {
        const ch = source[index];

        if (vowels[ch]) {
          pushChunk(vowels[ch], index, index + 1);
          return 1;
        }

        if (signs[ch] !== undefined) {
          pushChunk(signs[ch], index, index + 1);
          return 1;
        }

        if (cons[ch]) {
          const next = source[index + 1];

          if (next === viramaChar) {
            pushChunk(cons[ch], index, index + 2);
            return 2;
          }

          if (matras[next]) {
            pushChunk(cons[ch] + matras[next], index, index + 2);
            return 2;
          }

          pushChunk(cons[ch] + "a", index, index + 1);
          return 1;
        }

        return 0;
      }

      let i = 0;
      while (i < source.length) {
        const ch = source[i];

        if (/\s/.test(ch)) {
          pushChunk(" ", i, i + 1);
          i += 1;
          continue;
        }

        let consumed = processScript(i, DEV_VOWELS, DEV_MATRAS, DEV_CONS, DEV_SIGNS, "्");
        if (consumed) {
          i += consumed;
          continue;
        }

        consumed = processScript(i, GUJ_VOWELS, GUJ_MATRAS, GUJ_CONS, GUJ_SIGNS, "્");
        if (consumed) {
          i += consumed;
          continue;
        }

        pushChunk(ch.toLowerCase(), i, i + 1);
        i += 1;
      }

      const normalizedRoman = normalizeText(out);
      return {
        roman: normalizedRoman,
        map,
        rawRoman: out
      };
    }

    function addTypoFriendlyRomanVariants(text) {
      const base = normalizeText(text);
      const variants = new Set([base]);

      if (!base) return "";

      variants.add(base.replace(/aa/g, "a"));
      variants.add(base.replace(/ii/g, "i"));
      variants.add(base.replace(/uu/g, "u"));
      variants.add(base.replace(/ph/g, "f"));
      variants.add(base.replace(/bh/g, "b"));
      variants.add(base.replace(/sh/g, "s"));
      variants.add(base.replace(/chh/g, "ch"));
      variants.add(base.replace(/v/g, "w"));
      variants.add(base.replace(/w/g, "v"));
      variants.add(base.replace(/oo/g, "u"));
      variants.add(base.replace(/ee/g, "i"));
      variants.add(base.replace(/kh/g, "k"));
      variants.add(base.replace(/gh/g, "g"));
      variants.add(base.replace(/jh/g, "j"));
      variants.add(base.replace(/th/g, "t"));
      variants.add(base.replace(/dh/g, "d"));

      return Array.from(variants).join(" ");
    }

    function buildPreparedSong(song) {
      const title = String(song.title || "");
      const movie = String(song.movie || "");
      const singer = String(song.singer || "");
      const lyrics = String(song.lyrics || "");

      const titleRomanObj = transliterateIndicWithMap(title);
      const movieRomanObj = transliterateIndicWithMap(movie);
      const singerRomanObj = transliterateIndicWithMap(singer);
      const lyricsRomanObj = transliterateIndicWithMap(lyrics);

      const searchParts = [
        normalizeText(title),
        normalizeText(movie),
        normalizeText(singer),
        normalizeText(lyrics),
        addTypoFriendlyRomanVariants(titleRomanObj.roman),
        addTypoFriendlyRomanVariants(movieRomanObj.roman),
        addTypoFriendlyRomanVariants(singerRomanObj.roman),
        addTypoFriendlyRomanVariants(lyricsRomanObj.roman)
      ];

      return {
        ...song,
        _searchText: normalizeText(searchParts.join(" ")),
        _lyricsRoman: lyricsRomanObj.roman,
        _lyricsRomanMap: lyricsRomanObj.map
      };
    }

    function rebuildFuse() {
      preparedSongs = songs.map(buildPreparedSong);
      fuse = new Fuse(preparedSongs, {
        includeScore: true,
        threshold: 0.36,
        ignoreLocation: true,
        minMatchCharLength: 2,
        keys: [
          { name: "_searchText", weight: 0.8 },
          { name: "title", weight: 0.12 },
          { name: "movie", weight: 0.04 },
          { name: "singer", weight: 0.04 }
        ]
      });
    }

    async function loadSongs() {
      const status = document.getElementById("status");
      status.textContent = "Loading songs...";
      showError("");

      const { data, error } = await supabaseClient
        .from("songs")
        .select("*")
        .order("id", { ascending: false });

      if (error) {
        console.error(error);
        status.textContent = "Failed to load songs";
        showError(`Load error: ${error.message}`);
        return;
      }

      songs = data || [];
      rebuildFuse();
      status.textContent = `Loaded ${songs.length} songs`;
    }

    function searchSongs(query) {
      const q = normalizeText(query);
      if (!q || !fuse) return [];
      return fuse.search(q).map(result => result.item).slice(0, 10);
    }

    function mergeRanges(ranges) {
      if (!ranges.length) return [];
      ranges.sort((a, b) => a[0] - b[0]);

      const merged = [ranges[0].slice()];
      for (let i = 1; i < ranges.length; i++) {
        const current = ranges[i];
        const last = merged[merged.length - 1];

        if (current[0] <= last[1]) {
          last[1] = Math.max(last[1], current[1]);
        } else {
          merged.push(current.slice());
        }
      }
      return merged;
    }

    function findDirectRanges(text, query) {
      const source = String(text || "");
      const rawQuery = String(query || "").normalize("NFC").trim();
      if (!source || !rawQuery) return [];

      const ranges = [];
      const lowerSource = source.toLowerCase().normalize("NFC");
      const rawWords = rawQuery
        .toLowerCase()
        .normalize("NFC")
        .split(/\s+/)
        .filter(Boolean);

      const exactPhrase = rawQuery.toLowerCase().normalize("NFC");
      let idx = lowerSource.indexOf(exactPhrase);
      while (idx !== -1) {
        ranges.push([idx, idx + exactPhrase.length]);
        idx = lowerSource.indexOf(exactPhrase, idx + exactPhrase.length);
      }

      for (const word of rawWords) {
        let pos = lowerSource.indexOf(word);
        while (pos !== -1) {
          ranges.push([pos, pos + word.length]);
          pos = lowerSource.indexOf(word, pos + word.length);
        }
      }

      return mergeRanges(ranges);
    }

    function findRomanMappedRanges(originalText, preparedSong, query) {
      if (!isLatinQuery(query)) return [];

      const roman = preparedSong._lyricsRoman || "";
      const romanMap = preparedSong._lyricsRomanMap || [];
      const romanQueryVariants = addTypoFriendlyRomanVariants(query)
        .split(/\s+/)
        .filter(Boolean)
        .sort((a, b) => b.length - a.length);

      const ranges = [];

      for (const variant of romanQueryVariants) {
        const lookFor = normalizeText(variant);
        if (!lookFor) continue;

        let pos = roman.indexOf(lookFor);
        while (pos !== -1) {
          const mapStart = romanMap[pos];
          const mapEnd = romanMap[Math.min(pos + lookFor.length - 1, romanMap.length - 1)];
          if (mapStart && mapEnd) {
            ranges.push([mapStart.start, mapEnd.end]);
          }
          pos = roman.indexOf(lookFor, pos + 1);
        }
      }

      return mergeRanges(ranges);
    }

    function highlightText(song, query) {
      const original = String(song.lyrics || "");
      if (!query || !query.trim()) return escapeHtml(original);

      let ranges = findDirectRanges(original, query);
      if (!ranges.length) {
        ranges = findRomanMappedRanges(original, song, query);
      }
      if (!ranges.length) {
        return escapeHtml(original);
      }

      let result = "";
      let last = 0;
      for (const [start, end] of ranges) {
        result += escapeHtml(original.slice(last, start));
        result += `<mark>${escapeHtml(original.slice(start, end))}</mark>`;
        last = end;
      }
      result += escapeHtml(original.slice(last));
      return result;
    }

    function renderResults(results, query = "") {
      const root = document.getElementById("results");

      if (!query.trim()) {
        root.innerHTML = `<div class="empty">Type or speak a few words to find lyrics.</div>`;
        return;
      }

      if (!results.length) {
        root.innerHTML = `<div class="empty">No matching song found.</div>`;
        return;
      }

      root.innerHTML = results.map(song => `
        <div class="card">
          <div class="card-header">
            <div class="card-main">
              <div class="title">${escapeHtml(song.title || "")}</div>
              <div class="meta">${escapeHtml(song.movie || "")} • ${escapeHtml(song.singer || "")}</div>
            </div>
            <button class="edit-btn" type="button" onclick="startEdit(${song.id})" title="Edit">✎</button>
          </div>
          <div class="lyrics">${highlightText(song, query)}</div>
        </div>
      `).join("");
    }

    function resetForm() {
      editingSongId = null;
      document.getElementById("formHeading").textContent = "Add Song";
      document.getElementById("saveSongBtn").textContent = "Save Song";
      document.getElementById("cancelEditBtn").style.display = "none";
      document.getElementById("songTitle").value = "";
      document.getElementById("songMovie").value = "";
      document.getElementById("songSinger").value = "";
      document.getElementById("songLyrics").value = "";
      document.getElementById("formStatus").textContent = "";
    }

    function startEdit(songId) {
      const song = songs.find(s => s.id === songId);
      if (!song) return;

      editingSongId = song.id;
      document.getElementById("formHeading").textContent = "Edit Song";
      document.getElementById("saveSongBtn").textContent = "Update Song";
      document.getElementById("cancelEditBtn").style.display = "inline-block";
      document.getElementById("songTitle").value = song.title || "";
      document.getElementById("songMovie").value = song.movie || "";
      document.getElementById("songSinger").value = song.singer || "";
      document.getElementById("songLyrics").value = song.lyrics || "";
      document.getElementById("adminBox").classList.add("show");
      document.getElementById("songTitle").focus();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function saveSong(event) {
      event.preventDefault();

      const title = document.getElementById("songTitle").value.trim();
      const movie = document.getElementById("songMovie").value.trim();
      const singer = document.getElementById("songSinger").value.trim();
      const lyrics = document.getElementById("songLyrics").value.trim();
      const formStatus = document.getElementById("formStatus");

      if (!title || !lyrics) {
        formStatus.textContent = "Title and lyrics are required";
        return;
      }

      formStatus.textContent = editingSongId ? "Updating..." : "Saving...";
      showError("");

      let response;
      if (editingSongId) {
        response = await supabaseClient
          .from("songs")
          .update({ title, movie, singer, lyrics })
          .eq("id", editingSongId);
      } else {
        response = await supabaseClient
          .from("songs")
          .insert([{ title, movie, singer, lyrics }]);
      }

      if (response.error) {
        console.error(response.error);
        formStatus.textContent = editingSongId ? "Failed to update song" : "Failed to save song";
        showError(`Save error: ${response.error.message}`);
        return;
      }

      await loadSongs();

      const query = document.getElementById("searchInput").value;
      renderResults(searchSongs(query), query);

      resetForm();
      document.getElementById("adminBox").classList.remove("show");
    }

    function setMicUiState(listening) {
      const micBtn = document.getElementById("micBtn");
      if (listening) {
        micBtn.textContent = "🔴";
        micBtn.classList.add("mic-listening");
      } else {
        micBtn.textContent = "🎤";
        micBtn.classList.remove("mic-listening");
      }
    }

    function stopActiveRecognition() {
      if (activeRecognition) {
        try { activeRecognition.stop(); } catch (_) {}
        activeRecognition = null;
      }
      setMicUiState(false);
    }

    function startMicSearch() {
      const input = document.getElementById("searchInput");
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

      input.focus();
      showError("");

      if (!SpeechRecognition) {
        showError("This phone/browser does not support the webpage mic here. Use a browser that allows speech recognition, or use the keyboard mic.");
        return;
      }

      stopActiveRecognition();

      try {
        const recognition = new SpeechRecognition();
        activeRecognition = recognition;

        recognition.lang = currentMicLang;
        recognition.interimResults = true;
        recognition.maxAlternatives = 1;
        recognition.continuous = false;

        let finalTranscript = "";

        recognition.onstart = () => {
          setMicUiState(true);
          showError("Listening...");
        };

        recognition.onresult = (event) => {
          let liveText = "";

          for (let i = event.resultIndex; i < event.results.length; i++) {
            const transcript = event.results[i][0].transcript;
            if (event.results[i].isFinal) {
              finalTranscript += transcript + " ";
            } else {
              liveText += transcript;
            }
          }

          const combined = (finalTranscript + liveText).trim();
          input.value = combined;
          renderResults(searchSongs(combined), combined);
        };

        recognition.onerror = (event) => {
          setMicUiState(false);

          if (event.error === "not-allowed") {
            showError("Mic permission blocked. Allow microphone access in browser settings.");
          } else if (event.error === "language-not-supported") {
            showError("This browser does not support the selected mic language.");
          } else if (event.error === "no-speech") {
            showError("No speech detected. Tap again and speak immediately.");
          } else if (event.error === "audio-capture") {
            showError("No microphone detected by the browser.");
          } else {
            showError(`Mic error: ${event.error}.`);
          }

          activeRecognition = null;
        };

        recognition.onend = () => {
          setMicUiState(false);
          activeRecognition = null;

          const currentText = input.value.trim();
          if (!currentText) {
            showError("Mic stopped. Tap again and speak immediately.");
          } else {
            showError("");
          }
        };

        recognition.start();
      } catch (error) {
        setMicUiState(false);
        activeRecognition = null;
        showError("Webpage mic could not start on this phone/browser.");
      }
    }

    function setMicLanguage(lang) {
      currentMicLang = lang;

      const hiBtn = document.getElementById("langHiBtn");
      const guBtn = document.getElementById("langGuBtn");

      hiBtn.classList.toggle("active", lang === "hi-IN");
      guBtn.classList.toggle("active", lang === "gu-IN");

      showError(lang === "hi-IN" ? "Mic language set to Hindi" : "Mic language set to Gujarati");
    }

    async function init() {
      const input = document.getElementById("searchInput");
      const clearBtn = document.getElementById("clearBtn");
      const micBtn = document.getElementById("micBtn");
      const form = document.getElementById("songForm");
      const toggleAdminBtn = document.getElementById("toggleAdminBtn");
      const closeAdminBtn = document.getElementById("closeAdminBtn");
      const cancelEditBtn = document.getElementById("cancelEditBtn");
      const adminBox = document.getElementById("adminBox");
      const langHiBtn = document.getElementById("langHiBtn");
      const langGuBtn = document.getElementById("langGuBtn");

      input.addEventListener("input", () => {
        renderResults(searchSongs(input.value), input.value);
      });

      clearBtn.addEventListener("click", () => {
        input.value = "";
        renderResults([], "");
        input.focus();
      });

      micBtn.addEventListener("click", startMicSearch);

      langHiBtn.addEventListener("click", () => setMicLanguage("hi-IN"));
      langGuBtn.addEventListener("click", () => setMicLanguage("gu-IN"));

      toggleAdminBtn.addEventListener("click", () => {
        adminBox.classList.toggle("show");
        if (!adminBox.classList.contains("show")) resetForm();
      });

      closeAdminBtn.addEventListener("click", () => {
        adminBox.classList.remove("show");
        resetForm();
      });

      cancelEditBtn.addEventListener("click", resetForm);

      form.addEventListener("submit", saveSong);

      await loadSongs();
      renderResults([], "");
      input.focus();
    }

    window.startEdit = startEdit;
    init();
  </script>
</body>
</html>
