<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mehfil Lyrics Search</title>

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #111;
      margin: 0;
      padding: 12px;
      overflow-x: hidden;
    }

    .container {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      font-size: 28px;
      margin: 0 0 8px;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .info {
      color: #444;
      font-size: 14px;
    }

    .error-box {
      background: #fff3cd;
      color: #856404;
      border: 1px solid #ffe69c;
      padding: 10px 12px;
      border-radius: 10px;
      margin-bottom: 12px;
      display: none;
      white-space: pre-wrap;
    }

    .admin-toggle {
      background: #111;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
    }

    .admin-box {
      background: white;
      border: 1px solid #ddd;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 18px;
      display: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .admin-box.show { display: block; }

    .admin-box h2 {
      margin: 0 0 10px;
      font-size: 20px;
    }

    .admin-box input,
    .admin-box textarea {
      width: 100%;
      margin-bottom: 10px;
      padding: 12px;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #ccc;
      outline: none;
      background: white;
      color: #111;
    }

    .admin-box textarea {
      min-height: 180px;
      resize: vertical;
    }

    .admin-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .save-btn,
    .close-btn,
    .cancel-edit-btn {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
    }

    .save-btn {
      background: #111;
      color: white;
    }

    .close-btn,
    .cancel-edit-btn {
      background: #ddd;
      color: #111;
    }

    .search-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
      width: 100%;
      align-items: stretch;
    }

    .search-input {
      flex: 1;
      min-width: 0;
      width: 100%;
      padding: 16px;
      font-size: 20px;
      border-radius: 14px;
      border: 1px solid #ccc;
      outline: none;
      background: white;
      color: #111;
    }

    .icon-btn {
      border: 1px solid #ccc;
      border-radius: 14px;
      padding: 0 16px;
      font-size: 24px;
      cursor: pointer;
      min-width: 58px;
      background: white;
      color: #111;
      flex-shrink: 0;
    }

    .mic-listening {
      background: #ffe5e5;
      border-color: #ff7b7b;
    }

    .result-card {
      background: white;
      border: 1px solid #ddd;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 10px;
      width: 100%;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      cursor: pointer;
    }

    .result-card:hover {
      border-color: #bbb;
    }

    .result-main {
      min-width: 0;
      flex: 1;
    }

    .song-title {
      font-size: 19px;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .song-meta {
      color: #555;
      font-size: 14px;
      margin-bottom: 6px;
    }

    .song-snippet {
      color: #333;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .edit-btn {
      border: 1px solid #ccc;
      background: white;
      color: #111;
      border-radius: 10px;
      width: 38px;
      height: 38px;
      min-width: 38px;
      padding: 0;
      font-size: 18px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .empty {
      color: #666;
      text-align: center;
      padding: 20px 10px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 14px;
    }

    .hint {
      margin-top: 8px;
      color: #666;
      font-size: 13px;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 14px;
      z-index: 1000;
    }

    .modal.show {
      display: flex;
    }

    .modal-card {
      background: white;
      width: 100%;
      max-width: 760px;
      max-height: 85vh;
      overflow: auto;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.18);
    }

    .modal-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }

    .modal-title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .modal-meta {
      color: #555;
      font-size: 14px;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .modal-btn {
      border: none;
      border-radius: 10px;
      padding: 10px 12px;
      background: #111;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    .lyrics-full {
      line-height: 1.8;
      white-space: pre-wrap;
      font-size: 16px;
      color: #111;
      margin-top: 10px;
    }

    mark {
      background: #ffeb3b;
      color: #111;
      padding: 0 2px;
      border-radius: 3px;
    }

    @media (max-width: 480px) {
      body { padding: 10px; }
      h1 { font-size: 24px; }
      .search-input { font-size: 18px; padding: 14px; }
      .icon-btn { font-size: 22px; min-width: 52px; }
      .result-card { padding: 12px; }
      .song-title { font-size: 17px; }
      .song-snippet { font-size: 13px; }
      .edit-btn {
        width: 34px;
        height: 34px;
        min-width: 34px;
        font-size: 16px;
      }
      .modal-title { font-size: 20px; }
      .lyrics-full { font-size: 15px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Mehfil Lyrics Search</h1>

    <div class="top-row">
      <div class="info" id="status">Loading...</div>
      <button id="toggleAdminBtn" class="admin-toggle" type="button">+ Add Song</button>
    </div>

    <div id="errorBox" class="error-box"></div>

    <div class="admin-box" id="adminBox">
      <h2 id="formHeading">Add Song</h2>
      <form id="songForm">
        <input id="songTitle" type="text" placeholder="Song title" />
        <input id="songMovie" type="text" placeholder="Movie name" />
        <input id="songSinger" type="text" placeholder="Singer name" />
        <textarea id="songLyrics" placeholder="Paste full lyrics"></textarea>

        <div class="admin-actions">
          <button class="save-btn" id="saveSongBtn" type="submit">Save Song</button>
          <button class="cancel-edit-btn" id="cancelEditBtn" type="button" style="display:none;">Cancel Edit</button>
          <button class="close-btn" id="closeAdminBtn" type="button">Close</button>
          <div id="formStatus" class="info"></div>
        </div>
      </form>
      <div class="hint">Search shows song list first. Tap a song to open full lyrics. Edit is enabled. Delete is not included.</div>
    </div>

    <div class="search-bar">
      <button id="micBtn" class="icon-btn" type="button" title="Speak">🎤</button>
      <input
        id="searchInput"
        class="search-input"
        type="text"
        placeholder="Search by lyrics, singer, movie, or song..."
        autocomplete="off"
        autocapitalize="none"
        spellcheck="false"
        enterkeyhint="search"
      />
      <button id="clearBtn" class="icon-btn" type="button" title="Clear">✕</button>
    </div>

    <div id="results"></div>
  </div>

  <div id="songModal" class="modal">
    <div class="modal-card">
      <div class="modal-top">
        <div>
          <div id="modalTitle" class="modal-title"></div>

      </div>
      <div id="modalLyrics" class="lyrics-full"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.1.0"></script>

  <script>
    const SUPABASE_URL = "https://fppyrhsnqgisfxkdbkka.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZwcHlyaHNucWdpc2Z4a2Ria2thIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MzAxMjMsImV4cCI6MjA4OTEwNjEyM30.pXf_6qzEVw_fQpalyWsfxXgHrlbs1IA9BBmwfqmurDo";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let songs = [];
    let preparedSongs = [];
    let fuse = null;
    let editingSongId = null;
    let activeRecognition = null;
    let openSongId = null;
    let lastQuery = "";

    const DEV_VOWELS = {
      "अ":"a","आ":"aa","इ":"i","ई":"ii","उ":"u","ऊ":"uu","ऋ":"ri","ॠ":"rii","ऌ":"li","ॡ":"lii",
      "ए":"e","ऐ":"ai","ओ":"o","औ":"au","ऑ":"o","ऍ":"e"
    };
    const DEV_MATRAS = {
      "ा":"aa","ि":"i","ी":"ii","ु":"u","ू":"uu","ृ":"ri","ॄ":"rii","ॢ":"li","ॣ":"lii",
      "े":"e","ै":"ai","ो":"o","ौ":"au","ॅ":"e","ॉ":"o"
    };
    const DEV_CONS = {
      "क":"k","ख":"kh","ग":"g","घ":"gh","ङ":"ng",
      "च":"ch","छ":"chh","ज":"j","झ":"jh","ञ":"ny",
      "ट":"t","ठ":"th","ड":"d","ढ":"dh","ण":"n",

      "क़":"q","ख़":"kh","ग़":"g","ज़":"z","ड़":"r","ढ़":"rh","फ़":"f","य़":"y"
    };
    const DEV_SIGNS = { "ं":"n","ँ":"n","ः":"h","ऽ":"", "्":"", "़":"" };

    const GUJ_VOWELS = {
      "અ":"a","આ":"aa","ઇ":"i","ઈ":"ii","ઉ":"u","ઊ":"uu","ઋ":"ri","ૠ":"rii",
      "એ":"e","ઐ":"ai","ઓ":"o","ઔ":"au"
    };
    const GUJ_MATRAS = {
      "ા":"aa","િ":"i","ી":"ii","ુ":"u","ૂ":"uu","ૃ":"ri","ૄ":"rii",
      "ે":"e","ૈ":"ai","ો":"o","ૌ":"au"
    };
    const GUJ_CONS = {
      "ક":"k","ખ":"kh","ગ":"g","ઘ":"gh","ઙ":"ng",
      "ચ":"ch","છ":"chh","જ":"j","ઝ":"jh","ઞ":"ny",
      "ટ":"t","ઠ":"th","ડ":"d","ઢ":"dh","ણ":"n",
      "ત":"t","થ":"th","દ":"d","ધ":"dh","ન":"n",
      "પ":"p","ફ":"ph","બ":"b","ભ":"bh","મ":"m",
      "ય":"y","ર":"r","લ":"l","વ":"v",
      "શ":"sh","ષ":"sh","સ":"s","હ":"h",
      "ળ":"l"
    };
    const GUJ_SIGNS = { "ં":"n","ઃ":"h","ઁ":"n","્":"", "઼":"" };

    function showError(message) {
      const box = document.getElementById("errorBox");
      if (!message) {
        box.style.display = "none";
        box.textContent = "";
        return;
      }
      box.style.display = "block";
      box.textContent = message;
    }

    function escapeHtml(text) {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function normalizeText(text) {
      return String(text || "")
        .toLowerCase()
        .normalize("NFC")
        .replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?"'!|[\]\\]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function isLatinQuery(text) {
      return /[a-z]/i.test(text || "");
    }

    function transliterateIndicWithMap(text) {
      const source = String(text || "").normalize("NFC");
      let out = "";
      const map = [];

      function pushChunk(chunk, start, end) {
        if (!chunk) return;
        out += chunk;
        for (let i = 0; i < chunk.length; i++) map.push({ start, end });
      }

      function processScript(index, vowels, matras, cons, signs, viramaChar) {
        const ch = source[index];

        if (vowels[ch]) {
          pushChunk(vowels[ch], index, index + 1);
          return 1;
        }
        if (signs[ch] !== undefined) {
          pushChunk(signs[ch], index, index + 1);
          return 1;
        }
        if (cons[ch]) {
          const next = source[index + 1];
          if (next === viramaChar) {
            pushChunk(cons[ch], index, index + 2);
            return 2;
          }
          if (matras[next]) {
            pushChunk(cons[ch] + matras[next], index, index + 2);
            return 2;
          }
          pushChunk(cons[ch] + "a", index, index + 1);
          return 1;
        }
        return 0;
      }

      let i = 0;
      while (i < source.length) {
        const ch = source[i];
        if (/\s/.test(ch)) {
          pushChunk(" ", i, i + 1);
          i += 1;
          continue;
        }

        let consumed = processScript(i, DEV_VOWELS, DEV_MATRAS, DEV_CONS, DEV_SIGNS, "्");
        if (consumed) { i += consumed; continue; }

        consumed = processScript(i, GUJ_VOWELS, GUJ_MATRAS, GUJ_CONS, GUJ_SIGNS, "્");
        if (consumed) { i += consumed; continue; }

        pushChunk(ch.toLowerCase(), i, i + 1);
        i += 1;
      }

      return {
        roman: normalizeText(out),
        map,
        rawRoman: out
      };
    }

    function addTypoFriendlyRomanVariants(text) {
      const base = normalizeText(text);
      const variants = new Set([base]);
      if (!base) return "";

      variants.add(base.replace(/aa/g, "a"));
      variants.add(base.replace(/ii/g, "i"));
      variants.add(base.replace(/uu/g, "u"));
      variants.add(base.replace(/ph/g, "f"));
      variants.add(base.replace(/bh/g, "b"));
      variants.add(base.replace(/sh/g, "s"));
      variants.add(base.replace(/chh/g, "ch"));
      variants.add(base.replace(/v/g, "w"));
      variants.add(base.replace(/w/g, "v"));
      variants.add(base.replace(/oo/g, "u"));
      variants.add(base.replace(/ee/g, "i"));
      variants.add(base.replace(/kh/g, "k"));
      variants.add(base.replace(/gh/g, "g"));
      variants.add(base.replace(/jh/g, "j"));
      variants.add(base.replace(/th/g, "t"));
      variants.add(base.replace(/dh/g, "d"));

      return Array.from(variants).join(" ");
    }

    function buildPreparedSong(song) {
      const title = String(song.title || "");
      const movie = String(song.movie || "");
      const singer = String(song.singer || "");
      const lyrics = String(song.lyrics || "");

      const titleRomanObj = transliterateIndicWithMap(title);
      const movieRomanObj = transliterateIndicWithMap(movie);
      const singerRomanObj = transliterateIndicWithMap(singer);
      const lyricsRomanObj = transliterateIndicWithMap(lyrics);

      const titleSearch = normalizeText([title, addTypoFriendlyRomanVariants(titleRomanObj.roman)].join(" "));
      const movieSearch = normalizeText([movie, addTypoFriendlyRomanVariants(movieRomanObj.roman)].join(" "));
      const singerSearch = normalizeText([singer, addTypoFriendlyRomanVariants(singerRomanObj.roman)].join(" "));
      const lyricsSearch = normalizeText([lyrics, addTypoFriendlyRomanVariants(lyricsRomanObj.roman)].join(" "));

      const searchText = normalizeText([titleSearch, movieSearch, singerSearch, lyricsSearch].join(" "));

      return {
        ...song,
        _titleSearch: titleSearch,
        _movieSearch: movieSearch,
        _singerSearch: singerSearch,
        _lyricsSearch: lyricsSearch,
        _searchText: searchText,
        _lyricsRoman: lyricsRomanObj.roman,
        _lyricsRomanMap: lyricsRomanObj.map
      };
    }

    function rebuildFuse() {
      preparedSongs = songs.map(buildPreparedSong);
      fuse = new Fuse(preparedSongs, {
        includeScore: true,
        threshold: 0.36,
        ignoreLocation: true,
        minMatchCharLength: 2,
        keys: [
          { name: "_searchText", weight: 0.84 },
          { name: "_titleSearch", weight: 0.08 },
          { name: "_movieSearch", weight: 0.04 },
          { name: "_singerSearch", weight: 0.04 }
        ]
      });
    }

    async function loadSongs() {
      const status = document.getElementById("status");
      status.textContent = "Loading songs...";
      showError("");

      const { data, error } = await supabaseClient
        .from("songs")
        .select("*")
        .order("id", { ascending: false });

      if (error) {
        console.error(error);
        status.textContent = "Failed to load songs";
        showError(`Load error: ${error.message}`);
        return;
      }

      songs = data || [];
      rebuildFuse();
      status.textContent = `Loaded ${songs.length} songs`;
    }

    function getQueryVariants(query) {
      const raw = String(query || "");
      const n = normalizeText(raw);
      const roman = transliterateIndicWithMap(raw).roman;
      const typo = addTypoFriendlyRomanVariants(raw);
      return Array.from(new Set([n, roman, normalizeText(typo)])).filter(Boolean);
    }

    function anyIncludes(haystack, variants) {
      return variants.some(v => v && haystack.includes(v));
    }

    function searchSongs(query) {
      const q = normalizeText(query);
      if (!q || !fuse) return [];

      const variants = getQueryVariants(query);
      const candidates = fuse.search(q).slice(0, 30).map(r => r.item);

      return candidates.map(song => {
        const titleMatch = anyIncludes(song._titleSearch, variants);
        const movieMatch = anyIncludes(song._movieSearch, variants);
        const singerMatch = anyIncludes(song._singerSearch, variants);
        const lyricsMatch = anyIncludes(song._lyricsSearch, variants) || (!titleMatch && !movieMatch && !singerMatch);

        let score = 0;
        if (titleMatch) score += 5;
        if (movieMatch) score += 5;
        if (singerMatch) score += 5;
        if (lyricsMatch) score += 2;

        return {
          ...song,
          _matchType: {
            title: titleMatch,
            movie: movieMatch,
            singer: singerMatch,
            lyrics: lyricsMatch
          },
          _score: score
        };
      }).sort((a, b) => b._score - a._score).slice(0, 15);
    }

    function mergeRanges(ranges) {
      if (!ranges.length) return [];
      ranges.sort((a, b) => a[0] - b[0]);

      const merged = [ranges[0].slice()];
      for (let i = 1; i < ranges.length; i++) {
        const current = ranges[i];
        const last = merged[merged.length - 1];
        if (current[0] <= last[1]) {
          last[1] = Math.max(last[1], current[1]);
        } else {
          merged.push(current.slice());
        }
      }
      return merged;
    }

    function findDirectRanges(text, query) {
      const source = String(text || "");
      const rawQuery = String(query || "").normalize("NFC").trim();
      if (!source || !rawQuery) return [];

      const ranges = [];
      const lowerSource = source.toLowerCase().normalize("NFC");
      const words = rawQuery.toLowerCase().normalize("NFC").split(/\s+/).filter(Boolean);

      const exactPhrase = rawQuery.toLowerCase().normalize("NFC");
      let idx = lowerSource.indexOf(exactPhrase);
      while (idx !== -1) {
        ranges.push([idx, idx + exactPhrase.length]);
        idx = lowerSource.indexOf(exactPhrase, idx + exactPhrase.length);
      }

      for (const word of words) {
        let pos = lowerSource.indexOf(word);
        while (pos !== -1) {
          ranges.push([pos, pos + word.length]);
          pos = lowerSource.indexOf(word, pos + word.length);
        }
      }

      return mergeRanges(ranges);
    }

    function findRomanMappedRanges(song, query) {
      if (!isLatinQuery(query)) return [];
      const roman = song._lyricsRoman || "";
      const romanMap = song._lyricsRomanMap || [];
      const romanQueryVariants = addTypoFriendlyRomanVariants(query)
        .split(/\s+/)
        .filter(Boolean)
        .sort((a, b) => b.length - a.length);

      const ranges = [];
      for (const variant of romanQueryVariants) {
        const lookFor = normalizeText(variant);
        if (!lookFor) continue;

        let pos = roman.indexOf(lookFor);
        while (pos !== -1) {
          const mapStart = romanMap[pos];
          const mapEnd = romanMap[Math.min(pos + lookFor.length - 1, romanMap.length - 1)];
          if (mapStart && mapEnd) ranges.push([mapStart.start, mapEnd.end]);
          pos = roman.indexOf(lookFor, pos + 1);
        }
      }

      return mergeRanges(ranges);
    }

    function highlightText(song, query) {
      const original = String(song.lyrics || "");
      if (!query || !query.trim()) return escapeHtml(original);

      let ranges = findDirectRanges(original, query);
      if (!ranges.length) ranges = findRomanMappedRanges(song, query);
      if (!ranges.length) return escapeHtml(original);

      let result = "";
      let last = 0;
      for (const [start, end] of ranges) {
        result += escapeHtml(original.slice(last, start));
        result += `<mark>${escapeHtml(original.slice(start, end))}</mark>`;
        last = end;
      }
      result += escapeHtml(original.slice(last));
      return result;
    }

    function buildSnippet(song, query) {
      const original = String(song.lyrics || "");
      if (!song._matchType?.lyrics) return "";

      let ranges = findDirectRanges(original, query);
      if (!ranges.length) ranges = findRomanMappedRanges(song, query);
      if (!ranges.length) return "";

      const [start, end] = ranges[0];
      const snippetStart = Math.max(0, start - 35);
      const snippetEnd = Math.min(original.length, end + 45);
      const prefix = snippetStart > 0 ? "..." : "";
      const suffix = snippetEnd < original.length ? "..." : "";
      const miniSong = { ...song, lyrics: original.slice(snippetStart, snippetEnd) };

      return prefix + highlightText(miniSong, query) + suffix;
    }

    function openSong(songId) {
      const song = preparedSongs.find(s => s.id === songId);
      if (!song) return;

      openSongId = songId;
      document.getElementById("modalTitle").textContent = song.title || "";
      document.getElementById("modalMeta").textContent = `${song.movie || ""} • ${song.singer || ""}`;
      document.getElementById("modalLyrics").innerHTML = highlightText(song, lastQuery);
      document.getElementById("songModal").classList.add("show");
      document.body.style.overflow = "hidden";
    }

    function closeSongModal() {
      openSongId = null;
      document.getElementById("songModal").classList.remove("show");
      document.body.style.overflow = "";
    }

    function renderResults(results, query = "") {
      const root = document.getElementById("results");

      if (!query.trim()) {
        root.innerHTML = `<div class="empty">Type lyrics, singer, movie, or song name. Tap a result to open full lyrics.</div>`;
        return;
      }

      if (!results.length) {
        root.innerHTML = `<div class="empty">No matching song found.</div>`;
        return;
      }

      root.innerHTML = results.map(song => {
        const snippet = buildSnippet(song, query);
        return `
          <div class="result-card" data-song-id="${song.id}">
            <div class="result-main">
              <div class="song-title">${escapeHtml(song.title || "")}</div>
              <div class="song-meta">${escapeHtml(song.movie || "")} • ${escapeHtml(song.singer || "")}</div>
              ${snippet ? `<div class="song-snippet">${snippet}</div>` : ""}
            </div>
            <button class="edit-btn" type="button" data-edit-id="${song.id}" title="Edit">✎</button>
          </div>
        `;
      }).join("");
    }

    function resetForm() {
      editingSongId = null;
      document.getElementById("formHeading").textContent = "Add Song";
      document.getElementById("saveSongBtn").textContent = "Save Song";
      document.getElementById("cancelEditBtn").style.display = "none";
      document.getElementById("songTitle").value = "";
      document.getElementById("songMovie").value = "";
      document.getElementById("songSinger").value = "";
      document.getElementById("songLyrics").value = "";
      document.getElementById("formStatus").textContent = "";
    }

    function startEdit(songId) {
      const song = songs.find(s => s.id === songId);
      if (!song) return;

      editingSongId = song.id;
      document.getElementById("formHeading").textContent = "Edit Song";
      document.getElementById("saveSongBtn").textContent = "Update Song";
      document.getElementById("cancelEditBtn").style.display = "inline-block";
      document.getElementById("songTitle").value = song.title || "";
      document.getElementById("songMovie").value = song.movie || "";
      document.getElementById("songSinger").value = song.singer || "";
      document.getElementById("songLyrics").value = song.lyrics || "";
      document.getElementById("adminBox").classList.add("show");
      closeSongModal();
      document.getElementById("songTitle").focus();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function saveSong(event) {
      event.preventDefault();

      const title = document.getElementById("songTitle").value.trim();
      const movie = document.getElementById("songMovie").value.trim();
      const singer = document.getElementById("songSinger").value.trim();
      const lyrics = document.getElementById("songLyrics").value.trim();
      const formStatus = document.getElementById("formStatus");

      if (!title || !lyrics) {
        formStatus.textContent = "Title and lyrics are required";
        return;
      }

      formStatus.textContent = editingSongId ? "Updating..." : "Saving...";
      showError("");

      let response;
      if (editingSongId) {
        response = await supabaseClient
          .from("songs")
          .update({ title, movie, singer, lyrics })
          .eq("id", editingSongId);
      } else {
        response = await supabaseClient
          .from("songs")
          .insert([{ title, movie, singer, lyrics }]);
      }

      if (response.error) {
        console.error(response.error);
        formStatus.textContent = editingSongId ? "Failed to update song" : "Failed to save song";
        showError(`Save error: ${response.error.message}`);
        return;
      }

      await loadSongs();

      renderResults(searchSongs(lastQuery), lastQuery);

      if (openSongId) openSong(openSongId);

      resetForm();
      document.getElementById("adminBox").classList.remove("show");
    }

    function setMicUiState(listening) {
      const micBtn = document.getElementById("micBtn");
      if (listening) {
        micBtn.textContent = "🔴";
        micBtn.classList.add("mic-listening");
      } else {
        micBtn.textContent = "🎤";
        micBtn.classList.remove("mic-listening");
      }
    }

    function stopActiveRecognition() {
      if (activeRecognition) {
        try { activeRecognition.stop(); } catch (_) {}
        activeRecognition = null;
      }
      setMicUiState(false);
    }

    function detectMicLanguageFromQuery(text) {
      const value = String(text || "");
      if (/[\u0A80-\u0AFF]/.test(value)) return "gu-IN";
      return "hi-IN";
    }

    function startMicSearch() {
      const input = document.getElementById("searchInput");
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

      input.focus();
      showError("");

      if (!SpeechRecognition) {
        showError("This phone/browser does not support the webpage mic here. Use a browser that supports speech recognition, or use the keyboard mic.");
        return;
      }

      stopActiveRecognition();

      try {
        const recognition = new SpeechRecognition();
        activeRecognition = recognition;

        recognition.lang = detectMicLanguageFromQuery(input.value);
        recognition.interimResults = true;
        recognition.maxAlternatives = 1;
        recognition.continuous = false;

        let finalTranscript = "";

        recognition.onstart = () => {
          setMicUiState(true);
          showError("Listening...");
        };

        recognition.onresult = (event) => {
          let liveText = "";
          for (let i = event.resultIndex; i < event.results.length; i++) {
            const transcript = event.results[i][0].transcript;
            if (event.results[i].isFinal) {
              finalTranscript += transcript + " ";
            } else {
              liveText += transcript;
            }
          }

          const combined = (finalTranscript + liveText).trim();
          input.value = combined;
          lastQuery = combined;
          renderResults(searchSongs(combined), combined);
        };

        recognition.onerror = (event) => {
          setMicUiState(false);

          if (event.error === "not-allowed") {
            showError("Mic permission blocked. Allow microphone access in browser settings.");
          } else if (event.error === "language-not-supported") {
            showError("This browser does not support the detected speech language.");
          } else if (event.error === "no-speech") {
            showError("No speech detected. Tap again and speak immediately.");
          } else if (event.error === "audio-capture") {
            showError("No microphone detected by the browser.");
          } else {
            showError(`Mic error: ${event.error}.`);
          }

          activeRecognition = null;
        };

        recognition.onend = () => {
          setMicUiState(false);
          activeRecognition = null;

          const currentText = input.value.trim();
          if (!currentText) {
            showError("Mic stopped. Tap again and speak immediately.");
          } else {
            showError("");
          }
        };

        recognition.start();
      } catch (error) {
        setMicUiState(false);
        activeRecognition = null;
        showError("Webpage mic could not start on this phone/browser.");
      }
    }

    async function init() {
      const input = document.getElementById("searchInput");
      const clearBtn = document.getElementById("clearBtn");
      const micBtn = document.getElementById("micBtn");
      const form = document.getElementById("songForm");
      const toggleAdminBtn = document.getElementById("toggleAdminBtn");
      const closeAdminBtn = document.getElementById("closeAdminBtn");
      const cancelEditBtn = document.getElementById("cancelEditBtn");
      const adminBox = document.getElementById("adminBox");
      const songModal = document.getElementById("songModal");
      const modalCloseBtn = document.getElementById("modalCloseBtn");
      const modalEditBtn = document.getElementById("modalEditBtn");
      const results = document.getElementById("results");

      input.addEventListener("input", () => {
        lastQuery = input.value;
        renderResults(searchSongs(input.value), input.value);
      });

      clearBtn.addEventListener("click", () => {
        input.value = "";
        lastQuery = "";
        renderResults([], "");
        input.focus();
      });

      micBtn.addEventListener("click", startMicSearch);

      toggleAdminBtn.addEventListener("click", () => {
        adminBox.classList.toggle("show");
        if (!adminBox.classList.contains("show")) resetForm();
      });

      closeAdminBtn.addEventListener("click", () => {
        adminBox.classList.remove("show");
        resetForm();
      });

      cancelEditBtn.addEventListener("click", resetForm);

      form.addEventListener("submit", saveSong);

      results.addEventListener("click", (e) => {
        const editBtn = e.target.closest("[data-edit-id]");
        if (editBtn) {
          e.stopPropagation();
          startEdit(Number(editBtn.dataset.editId));
          return;
        }

        const card = e.target.closest("[data-song-id]");
        if (card) {
          openSong(Number(card.dataset.songId));
        }
      });

      modalCloseBtn.addEventListener("click", closeSongModal);
      modalEditBtn.addEventListener("click", () => {
        if (openSongId) startEdit(openSongId);
      });

      songModal.addEventListener("click", (e) => {
        if (e.target === songModal) closeSongModal();
      });

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeSongModal();
      });

      await loadSongs();
      renderResults([], "");
      input.focus();
    }

    init();
  </script>
</body>
</html>
